name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.8'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Set up CocoaPods
      run: |
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        # Force deployment target to 13.0 in project file
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
        # Create/Update Podfile with 13.0 target
        if [ ! -f ios/Podfile ]; then
          cd ios && flutter pub get && cd ..
        fi
        echo "platform :ios, '13.0'" > ios/Podfile.tmp
        cat ios/Podfile >> ios/Podfile.tmp || true
        mv ios/Podfile.tmp ios/Podfile
        cd ios && pod install --repo-update

    - name: Build iOS
      run: |
        flutter build ios --release --no-codesign

    - name: Create Payload directory
      run: mkdir -p build/ios/iphoneos/Payload

    - name: Move app to Payload
      run: |
        cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/

    - name: Create IPA
      run: cd build/ios/iphoneos && zip -r SIS-WDU-App.ipa Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SIS-WDU-App-${{ github.sha }}
        path: build/ios/iphoneos/SIS-WDU-App.ipa