name: Build iOS

on:
  push:
    branches: [ main, fadel/update ]
  pull_request:
    branches: [ main, fadel/update ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'any' # Akan mengambil versi stabil terbaru
        channel: 'stable'
        cache: true
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Prepare Podfile
      run: |
        # Generate Podfile and Flutter config files without checking certificates
        flutter build ios --no-codesign --config-only || true
        
        # Check if Podfile exists, if not create a basic one
        if [ ! -f ios/Podfile ]; then
          flutter create . --platforms ios
        fi
        
        # Force iOS 12.0 in Podfile
        sed -i '' "s/platform :ios, '9.0'/platform :ios, '12.0'/g" ios/Podfile
        
        # Ensure every pod targets iOS 12.0
        echo "
post_install do |installer|
  installer.pods_project.targets.each do |target|
    flutter_additional_ios_build_settings(target)
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
    end
  end
end" >> ios/Podfile
    
    - name: Build iOS
      run: flutter build ios --release --no-codesign
    
    - name: Create Payload directory
      run: mkdir -p build/ios/iphoneos/Payload
    
    - name: Move app to Payload
      run: mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
    
    - name: Create IPA
      run: cd build/ios/iphoneos && zip -r SIS-WDU-App.ipa Payload
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SIS-WDU-App-${{ github.sha }}
        path: build/ios/iphoneos/SIS-WDU-App.ipa
