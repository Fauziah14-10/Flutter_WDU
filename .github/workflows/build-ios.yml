name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.8'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Disable code signing
      run: |
        sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj

    - name: Fix Podfile
      run: |
        python3 - << 'PYEOF'
        import re, pathlib
        podfile = pathlib.Path("ios/Podfile").read_text()
        podfile = re.sub(r'post_install do \|installer\|.*?^end\n', '', podfile, flags=re.DOTALL | re.MULTILINE)
        podfile += "\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    flutter_additional_ios_build_settings(target)\n    target.build_configurations.each do |config|\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\n    end\n  end\nend\n"
        pathlib.Path("ios/Podfile").write_text(podfile)
        PYEOF
        cd ios && rm -f Podfile.lock && pod install --repo-update

    - name: Build iOS
      run: |
        xcodebuild \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build/ios/output \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Create Payload directory
      run: mkdir -p build/ios/iphoneos/Payload

    - name: Move app to Payload
      run: |
        APP=$(find build/ios/output -name "Runner.app" -type d | head -1)
        cp -r "$APP" build/ios/iphoneos/Payload/

    - name: Create IPA
      run: cd build/ios/iphoneos && zip -r SIS-WDU-App.ipa Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SIS-WDU-App-${{ github.sha }}
        path: build/ios/iphoneos/SIS-WDU-App.ipa