name: Build iOS

on:
  push:
    branches: [ main, fadel/update ]
  pull_request:
    branches: [ main, fadel/update ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Install Flutter dependencies
      run: flutter pub get

    - name: Setup iOS deployment target
      run: |
        # Set minimum iOS version di project
        sed -i '' \
          's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' \
          ios/Runner.xcodeproj/project.pbxproj

    - name: Setup Cocoapods
      run: |
        cd ios
        
        # Hapus Podfile.lock lama agar fresh install
        rm -f Podfile.lock
        
        # Pastikan post_install block tidak duplikat
        # Hapus post_install lama kalau ada, lalu tulis ulang yang clean
        python3 - <<'EOF'
        import re, pathlib
        
        podfile = pathlib.Path("Podfile").read_text()

        podfile = re.sub(
            r'post_install do \|installer\|.*?^end\n',
            '',
            podfile,
            flags=re.DOTALL | re.MULTILINE
        )

        # Tambah post_install yang bersih
        podfile += """
        post_install do |installer|
            installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                end
            end
        end
        """
        pathlib.Path("Podfile").write_text(podfile)
        print("Podfile updated successfully")
        EOF

        pod install --repo-update

    - name: Build iOS
      run: flutter build ios --release --no-codesign

    - name: Package IPA
      run: |
        mkdir -p build/ios/iphoneos/Payload
        cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -r SIS-WDU-App.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: SIS-WDU-App-${{ github.sha }}
        path: build/ios/iphoneos/SIS-WDU-App.ipa
        retention-days: 7